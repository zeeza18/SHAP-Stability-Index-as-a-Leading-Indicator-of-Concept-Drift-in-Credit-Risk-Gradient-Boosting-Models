framework: optuna
n_trials: 150
timeout_seconds: 7200    # 2 hours
sampler: TPESampler
sampler_seed: 42
pruner: MedianPruner
pruner_n_startup_trials: 20
pruner_n_warmup_steps: 5
objective_metric: roc_auc
validation_strategy: temporal   # train on windows 1..N, validate on window N+1
results_dir: experiments/tuning/tuning_results
